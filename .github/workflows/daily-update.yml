name: Daily paper update

on:
  schedule:
    - cron: '30 1 * * *' # 09:30 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily archive update
        run: |
          python scripts/update_daily_archive.py
          python scripts/update_weekly_summary.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily weekly
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          TODAY=$(TZ=Asia/Shanghai date +%F)
          git commit -m "chore: update paper archive for ${TODAY}"
          git push
